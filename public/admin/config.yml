backend:
  name: github
  repo: Fransn97/fsn-web
  branch: main
  base_url: https://fsn-web.vercel.app
  auth_endpoint: /api/auth

media_folder: public/assets/uploads
public_folder: /assets/uploads

locale: es

collections:
  - name: insights
    label: Insights
    label_singular: Insight
    folder: src/content/insights
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Extracto, name: excerpt, widget: text }
      - { label: Categoría, name: category, widget: string }
      - { label: Tiempo de lectura, name: readTime, widget: string, hint: "Ej: 8 min" }
      - { label: Fecha de publicación, name: publishedAt, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: Imagen, name: image, widget: image, required: false, hint: "Se aplica el filtro de estilo automáticamente" }
      - { label: Contenido, name: body, widget: markdown }

  - name: cases
    label: Case Studies
    label_singular: Case Study
    folder: src/content/cases
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Categoría, name: category, widget: string, hint: "Ej: Applied AI · RAG" }
      - { label: Contexto, name: context, widget: text }
      - { label: Mi rol, name: role, widget: string }
      - { label: Approach, name: approach, widget: text }
      - { label: Resultado, name: result, widget: text }
      - { label: Stack, name: stack, widget: list, required: false, hint: "Tecnologías, una por línea" }
      - { label: Imagen, name: image, widget: image, required: false, hint: "Se aplica el filtro de estilo automáticamente" }
      - { label: Contenido, name: body, widget: markdown }

  - name: pages
    label: Páginas
    files:
      - name: home
        label: Home (Inicio)
        file: src/data/home.json
        fields:
          - { label: "Hero — Concepto (línea superior)", name: heroConcept, widget: string }
          - { label: "Hero — Estado / ubicación", name: heroStatus, widget: string }
          - { label: "Hero — Titular (antes de la palabra que rota)", name: heroTitlePre, widget: string, hint: "Ej: Primero el" }
          - { label: "Hero — Palabras que rotan", name: heroRotator, widget: list, hint: "Se alternan solas. Ej: negocio, proceso, problema, resultado" }
          - { label: "Hero — Titular (después, admite <em>)", name: heroTitlePost, widget: string, hint: "Ej: Después la <em>tecnología.</em>" }
          - { label: "Hero — Subtexto", name: heroSubtext, widget: text }
          - { label: "Hero — Ticker (cinta en bucle)", name: heroTicker, widget: list }
          - { label: "Banda — Imagen A", name: bandImageA, widget: image, required: false }
          - { label: "Banda — Imagen B", name: bandImageB, widget: image, required: false }
          - { label: "Posicionamiento — Titular", name: statementBig, widget: text }
          - { label: "Posicionamiento — Columna izquierda", name: statementLeft, widget: text }
          - { label: "Posicionamiento — Columna derecha", name: statementRight, widget: text }
          - { label: "About — Titular", name: aboutLead, widget: string }
          - { label: "About — Párrafo 1", name: aboutText1, widget: text }
          - { label: "About — Párrafo 2", name: aboutText2, widget: text }
          - { label: "About — Retrato", name: aboutPortrait, widget: image, required: false }
